[project]
name = "ingestion"
version = "0.0.0"
description = "Vault parsing, ^id injection, incremental indexing, file watcher."
requires-python = ">=3.12"
dependencies = [
    "watchdog>=5.0",
    "markdown-it-py>=3.0",
    "pyyaml>=6.0",
    "retrieval",
]

[tool.uv.sources]
retrieval = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingestion"]
