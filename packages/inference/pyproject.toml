[project]
name = "inference"
version = "0.0.0"
description = "OpenAI-compatible inference adapter. See ADR-0009."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inference"]
