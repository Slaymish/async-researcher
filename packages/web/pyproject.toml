[project]
name = "web"
version = "0.1.0"
description = "SearXNG + DDGS search adapter and curl_cffi + Crawl4AI fetch adapter (ADR-0018)."
requires-python = ">=3.12"
dependencies = [
    "ddgs>=7.0",
    "curl-cffi>=0.7",
    "crawl4ai>=0.4",
    "html2text>=2024.2",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/web"]
