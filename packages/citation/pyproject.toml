[project]
name = "citation"
version = "0.0.0"
description = "Three-stage deterministic citation pipeline. See ADR-0013."
requires-python = ">=3.12"
dependencies = [
    "markdown-it-py>=3.0",
    "pydantic>=2.9",
    "inference",
    "retrieval",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citation"]

[tool.uv.sources]
inference = { workspace = true }
retrieval = { workspace = true }
