[project]
name = "retrieval"
version = "0.0.0"
description = "LightRAG + DuckDB hybrid retrieval. See ADR-0011."
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/retrieval"]
