[project]
name = "memory"
version = "0.0.0"
description = "Mem0 adapter — local-first cross-session memory (v0.2.3)."
requires-python = ">=3.12"
dependencies = [
    # Pin minor — major bumps have historically broken the embedder
    # contract upstream. See docs/v0.2.3_MEM0_PLAN.md R5.
    "mem0ai>=2.0,<2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memory"]
